###############################################################################
# environment.yml — Conda environment for Scalable Fake News Detection
# Module: 7006SCN Machine Learning and Big Data (Coventry University)
#
# Usage:
#   conda env create -f environment.yml
#   conda activate fakenews-bigdata
###############################################################################
name: fakenews-bigdata
channels:
  - conda-forge
  - defaults

dependencies:
  # ---------- Python ----------
  - python=3.10               # LTS; PySpark 3.5 wheels are built for 3.10

  # ---------- Spark ecosystem ----------
  - pyspark=3.5.1             # Matches current AWS EMR 7.x default
  - pyarrow=15.0.0            # Columnar in-memory; Spark Arrow optimization
  - findspark=2.0.1           # Auto-locate SPARK_HOME in notebooks

  # ---------- ML / Stats ----------
  - scikit-learn=1.4.0        # Baseline single-node models for comparison
  - pandas=2.2.0              # Local DataFrame manipulation / Tableau export
  - numpy=1.26.4              # Numerical backend
  - scipy=1.12.0              # Statistical tests (McNemar, etc.)

  # ---------- Visualization ----------
  - matplotlib=3.8.3          # Static plots (confusion matrix, scaling curves)
  - seaborn=0.13.2            # Statistical heatmaps / distribution plots

  # ---------- AWS / Data ----------
  - boto3=1.34.40             # S3 access to Common Crawl buckets
  - requests=2.31.0           # HTTP fallback for WARC downloads
  - warcio=1.7.4              # WARC/WET record parsing

  # ---------- Notebook / Dev ----------
  - jupyter=1.0.0
  - jupyterlab=4.1.1
  - ipykernel=6.29.2
  - nbformat=5.9.2

  # ---------- Utilities ----------
  - tqdm=4.66.1               # Progress bars for batch downloads
  - pyyaml=6.0.1              # Read config/*.yaml
  - python-dotenv=1.0.1       # .env for AWS credentials (never committed)

  # ---------- Testing ----------
  - pytest=8.0.0
  - pytest-cov=4.1.0

  # pip-only packages
  - pip:
      - sparknlp==5.2.3       # John Snow Labs NLP (optional advanced features)
      - beautifulsoup4==4.12.3 # HTML text extraction from WET/WARC
      - lxml==5.1.0            # Fast HTML parser backend
